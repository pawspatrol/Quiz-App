<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bible CBT Platform</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <main class="app">

    <section id="home-page" class="page active">
      <div class="card center-card">
        <div class="logo" style="cursor:pointer" title="Tap to toggle Dark Mode">📖</div>
        <h1>Bible Quiz Platform</h1>
        <p class="subtitle">100 Questions • 30 Minutes</p>

        <div class="input-group">
          <input 
            type="text" 
            id="user-name" 
            placeholder="Enter your full name"
            autocomplete="off"
          />
        </div>

        <button id="start-btn">Start Exam</button>
        <p class="footer-brand">TechGuru Systems</p>
      </div>
    </section>


    <section id="quiz-page" class="page">
      <div class="quiz-wrapper">
        
        <div class="quiz-top">
          <div class="progress">
            Question <span id="current-num">1</span> / 100
          </div>
          <div id="timer">30:00</div>
        </div>

        <div id="navigator" class="navigator"></div>

        <div class="question-box">
          <h2 id="question-text">Loading question...</h2>
          <div id="options-container"></div>
        </div>

        <div class="controls">
          <button id="prev-btn">Previous</button>
          <button id="next-btn">Next</button>
          <button id="submit-btn" class="submit">Submit Exam</button>
        </div>

      </div>
    </section>


    <section id="result-page" class="page">
      <div class="card result-card">
        <h2>Examination Result</h2>
        
        <div class="score-box">
          <p id="candidate-name-display" style="font-weight: 700; color: #64748b; margin-bottom: 5px;"></p>
          <h1 id="final-score" style="font-size: 48px; color: #4f46e5;">0 / 100</h1>
          <p id="percentage-label" style="font-weight: 600;"></p>
          </div>

        <p style="font-size: 12px; color: #94a3b8; margin-top: 20px;">Knowledge Distribution (OT vs NT)</p>
        <div class="chart-area" style="position: relative; height:220px; width:100%; margin: 10px 0;">
          <canvas id="scoreChart"></canvas>
        </div>

        <div class="review-section">
          <h3 style="margin-bottom: 15px;">Answer Review</h3>
          <div id="review-container"></div>
        </div>

        <button class="retry-btn" onclick="location.reload()">Take Another Exam</button>
      </div>
    </section>

  </main>

  <script src="questions.js"></script>
  <script src="script.js"></script>

</body>
</html>
