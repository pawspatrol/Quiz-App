<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible CBT Platform | TechGuru Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <div id="home-page" class="card">
            <div class="icon">📖</div>
            <h1>Bible Quiz Platform</h1>
            <p class="subtitle">100 Questions • 30 Minutes • Instant Feedback</p>
            
            <div class="input-group">
                <input type="text" id="user-name" placeholder="Enter your full name" autocomplete="off">
            </div>
            
            <button id="start-btn" onclick="startExam()">Begin Examination</button>
            <p class="footer-note">Powered by TechGuru Systems</p>
        </div>

        <div id="quiz-page" class="card" style="display: none;">
            <div class="quiz-header">
                <div class="progress-pill">
                    Question <span id="current-num">1</span> of 100
                </div>
                <div id="timer">Time Left: 30:00</div>
            </div>

            <div id="question-container">
                <h3 id="question-text">Loading question...</h3>
                <div id="options-container">
                    </div>
            </div>
        </div>

        <div id="result-page" class="card" style="display: none;">
            <div class="result-header">
                <h2>Examination Result</h2>
                <p id="candidate-display"></p>
            </div>

            <div class="score-section">
                <span class="score-label">Final Score</span>
                <h1 id="final-score">0 / 100</h1>
            </div>

            <hr class="divider">

            <div class="analysis-section">
                <h3>Knowledge Distribution</h3>
                <p class="analysis-subtext">Old Testament vs New Testament Performance</p>
                
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>

            <button class="retry-btn" onclick="location.reload()">Take Another Exam</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
