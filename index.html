<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bible CBT Platform</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <main class="app">

    <!-- ================= LANDING ================= -->
    <section id="home-page" class="page active">

      <div class="card center-card">
        <div class="logo">📖</div>

        <h1>Bible Quiz Platform</h1>
        <p class="subtitle">100 Questions • 30 Minutes</p>

        <div class="input-group">
          <input 
            type="text" 
            id="user-name" 
            placeholder="Enter your full name"
            autocomplete="off"
          />
        </div>

        <button id="start-btn">Start Exam</button>

        <p class="footer">TechGuru Systems</p>
      </div>

    </section>


    <!-- ================= QUIZ ================= -->
    <section id="quiz-page" class="page">

      <div class="quiz-wrapper">

        <!-- Header -->
        <div class="quiz-top">
          <div class="progress">
            Question <span id="current-num">1</span> / 100
          </div>

          <div id="timer">30:00</div>
        </div>

        <!-- Navigator -->
        <div id="navigator" class="navigator"></div>

        <!-- Question -->
        <div class="question-box">
          <h2 id="question-text">Loading question...</h2>
          <div id="options-container"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button id="prev-btn">Previous</button>
          <button id="next-btn">Next</button>
          <button id="submit-btn" class="submit">Submit</button>
        </div>

      </div>

    </section>


    <!-- ================= RESULT ================= -->
    <section id="result-page" class="page">

      <div class="card result-card">

        <h2>Result Summary</h2>
        <p id="candidate-name"></p>

        <div class="score-box">
          <h1 id="final-score">0 / 100</h1>
          <p id="percentage"></p>
        </div>

        <!-- Chart -->
        <div class="chart-area">
          <canvas id="scoreChart"></canvas>
        </div>

        <!-- Review -->
        <div class="review-section">
          <h3>Answer Review</h3>
          <div id="review-container"></div>
        </div>

        <button onclick="location.reload()">Take Again</button>

      </div>

    </section>

  </main>

  <!-- Scripts -->
  <script src="questions.js"></script>
  <script src="script.js"></script>

</body>
          </html>
