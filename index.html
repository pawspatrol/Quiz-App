<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Quiz Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #1e293b;
      --accent: #d4af37; /* Gold accent from your screenshot */
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Elegant purple gradient bg */
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .quiz-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      text-align: center;
      margin-top: 40px;
    }

    .exam-header {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 20px;
      color: var(--primary);
    }

    .question-text {
      font-size: 18px;
      line-height: 1.6;
      margin: 25px 0;
      text-align: left;
      font-weight: 600;
    }

    .option {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      padding: 15px 20px;
      margin: 12px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
      text-align: left;
    }

    .option:hover {
      background: #e2e8f0;
    }

    .option.selected {
      border-color: var(--primary);
      background: #f8fafc;
    }

    .option-letter {
      width: 30px;
      height: 30px;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-weight: bold;
      font-size: 12px;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-prev { background: #e2e8f0; color: #64748b; }
    .btn-next { background: var(--primary); color: white; }
    .btn-submit { background: var(--primary); color: white; width: 100%; margin-top: 15px; }

    #timer {
      background: #fef9c3;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      color: #854d0e;
      display: inline-block;
      margin-bottom: 20px;
    }

    /* Result Circle Styles */
    .result-circle {
      width: 150px;
      height: 150px;
      border: 10px solid var(--accent);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="start-screen" class="quiz-card">
    <div style="font-size: 40px; margin-bottom: 15px;">📖</div>
    <h1>Test Your Bible Knowledge</h1>
    <p style="color: #64748b;">A 20-minute scriptural challenge. Answer carefully, and let your spirit be stirred.</p>
    <div style="display: flex; justify-content: space-around; margin: 30px 0;">
      <div><strong>100</strong><br><small>Questions</small></div>
      <div><strong>20</strong><br><small>Minutes</small></div>
      <div><strong>4</strong><br><small>Choices</small></div>
    </div>
    <button class="btn-next" onclick="startQuiz()">Begin Examination</button>
  </div>

  <div id="quiz-screen" class="quiz-card hidden">
    <div id="timer">19:59</div>
    <div class="exam-header" id="progress-text">Question 1 of 100</div>
    <div class="question-text" id="question-body">Loading...</div>
    <div id="options-container"></div>
    <div class="nav-buttons">
      <button class="btn-prev" onclick="changeQuestion(-1)">Previous</button>
      <button class="btn-next" onclick="changeQuestion(1)">Next</button>
    </div>
    <button class="btn-submit" onclick="showResults()">Submit Quiz</button>
  </div>

  <div id="result-screen" class="quiz-card hidden">
    <div class="exam-header">Examination Complete</div>
    <h1>Well done.</h1>
    <div class="result-circle">
      <div id="final-score" style="font-size: 24px; font-weight: bold;">0/100</div>
      <div id="final-percent" style="font-size: 14px; color: var(--accent);">0%</div>
    </div>
    <p id="feedback-text" style="color: #64748b; padding: 0 20px;"></p>
    <button class="btn-next" onclick="location.reload()">Take It Again</button>
  </div>

  <script>
    // THE DATA (100 Questions)
    const bibleQuestions = [
      { question: "What Babylonian name was given to Daniel by the prince of the eunuchs?", options: ["Belteshazzar", "Belshazzar", "Abednego", "Beltheshar"], answer: "Belteshazzar", testament: "Old" },
      { question: "Which prophet was forbidden to mourn aloud when his wife died, as a sign to Israel?", options: ["Ezekiel", "Hosea", "Jeremiah", "Isaiah"], answer: "Ezekiel", testament: "Old" },
      // ... [The other 98 questions from the previous script go here]
      { question: "About how many souls were added to the church on the day of Pentecost?", options: ["Three thousand", "Five thousand", "One hundred and twenty", "Seven thousand"], answer: "Three thousand", testament: "New" }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(bibleQuestions.length).fill(null);
    let timeLeft = 20 * 60;

    function startQuiz() {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      renderQuestion();
      startTimer();
    }

    function renderQuestion() {
      const q = bibleQuestions[currentIdx];
      document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${bibleQuestions.length}`;
      document.getElementById('question-body').innerText = q.question;
      
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      q.options.forEach((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        const div = document.createElement('div');
        div.className = `option ${userAnswers[currentIdx] === opt ? 'selected' : ''}`;
        div.innerHTML = `<div class="option-letter">${letter}</div> <span>${opt}</span>`;
        div.onclick = () => {
          userAnswers[currentIdx] = opt;
          renderQuestion();
        };
        container.appendChild(div);
      });
    }

    function changeQuestion(step) {
      currentIdx += step;
      if (currentIdx < 0) currentIdx = 0;
      if (currentIdx >= bibleQuestions.length) currentIdx = bibleQuestions.length - 1;
      renderQuestion();
    }

    function startTimer() {
      const timerDisplay = document.getElementById('timer');
      const timerId = setInterval(() => {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        timerDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) {
          clearInterval(timerId);
          showResults();
        }
        timeLeft--;
      }, 1000);
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      
      let score = 0;
      let wrongOld = 0, wrongNew = 0;
      
      bibleQuestions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
        else {
          if (q.testament === "Old") wrongOld++; else wrongNew++;
        }
      });

      const percent = Math.round((score / bibleQuestions.length) * 100);
      document.getElementById('final-score').innerText = `${score}/${bibleQuestions.length}`;
      document.getElementById('final-percent').innerText = `${percent}%`;
      
      let feedback = percent > 80 ? "Outstanding — your knowledge of the Word is rich and deep." : "Keep studying — the Word of God is a lamp unto your feet.";
      if (wrongOld > wrongNew) feedback += " Focus some more study on the Old Testament!";
      document.getElementById('feedback-text').innerText = feedback;
    }
  </script>
</body>
    </html>
