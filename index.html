<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Quiz Platform | TechGuru</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <div id="home-page" class="card">
            <div class="icon">📖</div>
            <h1>Bible Quiz Platform</h1>
            <p>100 Questions | 30 Minutes</p>
            <input type="text" id="user-name" placeholder="Enter your full name">
            <button id="start-btn" onclick="startExam()">Begin Examination</button>
        </div>

        <div id="quiz-page" class="card" style="display: none;">
            <div class="quiz-header">
                <span id="timer">30:00</span>
            </div>
            <div id="question-container">
                <h3 id="question-text">Loading question...</h3>
                <div id="options-container">
                    </div>
            </div>
            <div class="quiz-footer">
                <p>Question <span id="current-num">1</span> of 100</p>
            </div>
        </div>

        <div id="result-page" class="card" style="display: none;">
            <h2>Examination Result</h2>
            <p id="candidate-display" style="font-weight: bold; margin-bottom: 10px;"></p>
            <h1 id="final-score" style="color: #6c5ce7;">0/100</h1>
            
            <div style="width: 100%; max-width: 250px; margin: 25px auto;">
                <canvas id="scoreChart"></canvas>
            </div>

            <div style="margin-bottom: 25px;">
                <p style="font-size: 14px; color: #636e72;">Knowledge Distribution (OT vs NT)</p>
            </div>

            <button onclick="location.reload()">Take Another Exam</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
