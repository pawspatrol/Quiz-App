<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible CBT Platform | TechGuru Elite</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <main class="container">

    <!-- ================= HOME / LOGIN ================= -->
    <section id="home-page" class="card">
      <div class="icon">📖</div>

      <h1 class="title">Bible Quiz Platform</h1>
      <p class="subtitle">100 Questions • 30 Minutes • Instant Feedback</p>

      <div class="input-group">
        <input 
          type="text" 
          id="user-name" 
          placeholder="Enter your full name"
          autocomplete="off"
        >
      </div>

      <button id="start-btn" onclick="startExam()">
        Begin Examination
      </button>

      <p class="footer-note">Powered by TechGuru Systems</p>
    </section>


    <!-- ================= QUIZ PAGE ================= -->
    <section id="quiz-page" class="card hidden">

      <!-- Header -->
      <div class="quiz-header">
        <div class="progress-pill">
          Question <span id="current-num">1</span> / 100
        </div>

        <div id="timer">⏱ 30:00</div>
      </div>

      <!-- Navigation Grid -->
      <div id="navigator" class="navigator"></div>

      <!-- Question -->
      <div id="question-container">
        <h3 id="question-text">Loading question...</h3>
        <div id="options-container"></div>
      </div>

      <!-- Controls -->
      <div class="quiz-controls">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
        <button id="submit-btn">Submit Exam</button>
      </div>

    </section>


    <!-- ================= RESULT PAGE ================= -->
    <section id="result-page" class="card hidden">

      <div class="result-header">
        <h2>Examination Result</h2>
        <p id="candidate-display"></p>
      </div>

      <!-- Score -->
      <div class="score-section">
        <span class="score-label">Final Score</span>
        <h1 id="final-score">0 / 100</h1>
        <p id="percentage"></p>
      </div>

      <hr class="divider">

      <!-- Chart -->
      <div class="analysis-section">
        <h3>Knowledge Distribution</h3>
        <p class="analysis-subtext">
          Old Testament vs New Testament Performance
        </p>

        <div class="chart-container">
          <canvas id="scoreChart"></canvas>
        </div>
      </div>

      <hr class="divider">

      <!-- Review -->
      <div class="review-section">
        <h3>Answer Review</h3>
        <div id="review-container"></div>
      </div>

      <button class="retry-btn" onclick="location.reload()">
        Take Another Exam
      </button>

    </section>

  </main>

  <!-- Scripts -->
  <script src="questions.js"></script>
  <script src="script.js"></script>

</body>
    </html>
