<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bible CBT Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app">
    <section id="home-page" class="page active">
      <div class="card center-card">
        <div class="logo">📖</div>
        <h1>Bible Quiz Platform</h1>
        <p class="subtitle">100 Questions • 30 Minutes</p>
        <div class="input-group">
          <input type="text" id="user-name" placeholder="Enter your full name" autocomplete="off" />
        </div>
        <button id="start-btn">Start Exam</button>
        <p class="footer-brand">TechGuru Systems</p>
      </div>
    </section>

    <section id="quiz-page" class="page" style="display: none;">
      <div class="quiz-wrapper">
        <div class="quiz-top">
          <div class="progress">Question <span id="current-num">1</span> / 100</div>
          <div id="timer">30:00</div>
        </div>
        <div id="navigator" class="navigator"></div>
        <div class="question-box">
          <h2 id="question-text">Loading...</h2>
          <div id="options-container"></div>
        </div>
        <div class="controls">
          <button id="prev-btn">Previous</button>
          <button id="next-btn">Next</button>
          <button id="submit-btn" class="submit">Submit Exam</button>
        </div>
      </div>
    </section>

    <section id="result-page" class="page" style="display: none;">
      <div class="card result-card">
        <h2>Examination Result</h2>
        <div class="score-box">
          <p id="candidate-name-display"></p>
          <h1 id="final-score">0 / 100</h1>
          <p id="percentage-label"></p>
        </div>
        <div class="chart-area">
          <canvas id="scoreChart"></canvas>
        </div>
        <div class="review-section">
          <h3>Answer Review</h3>
          <div id="review-container"></div>
        </div>
        <button class="retry-btn" onclick="location.reload()">Take Another Exam</button>
      </div>
    </section>
  </main>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
