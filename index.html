<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bible CBT Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="start-screen" class="quiz-card">
    <div style="font-size: 50px;">📖</div>
    <h1 style="font-family: 'Playfair Display';">Bible Quiz Platform</h1>
    <p>100 Random Questions | 30 Minutes</p>
    
    <div style="margin: 25px 0;">
      <input type="text" id="username" placeholder="Enter your full name" 
             style="padding: 15px; width: 85%; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; text-align: center;">
    </div>

    <button class="btn-primary" onclick="startQuiz()">Begin Examination</button>
  </div>

  <div id="quiz-screen" class="quiz-card hidden">
    <div id="timer">30:00</div>
    <div id="progress" style="color: #d4af37; font-weight: bold; font-size: 13px; letter-spacing: 1px;">QUESTION 1 OF 100</div>
    
    <div class="question-text" id="question-body"></div>
    <div id="options-container"></div>
    
    <div style="display: flex; justify-content: space-between; margin-top: 20px;">
        <button class="btn-nav" onclick="changeQuestion(-1)">Previous</button>
        <button class="btn-nav" style="background: #1e293b; color: white;" onclick="changeQuestion(1)">Next</button>
    </div>

    <div class="nav-grid" id="question-nav"></div>
    
    <button class="btn-submit" onclick="showResults()">Submit Final Score</button>
  </div>

  <div id="result-screen" class="quiz-card hidden">
    <h1>Examination Finished</h1>
    <div id="user-display-name" style="font-weight: bold; color: #64748b; margin-bottom: 10px;"></div>
    <div id="final-score" style="font-size: 40px; font-weight: bold; color: #d4af37;">0/100</div>
    <p id="feedback-text"></p>
    <button class="btn-primary" onclick="location.reload()">Restart Quiz</button>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
