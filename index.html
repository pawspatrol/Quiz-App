<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Quiz Platform</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; padding-bottom: 50px; }
    header { background: #1e293b; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 2px solid #334155; }
    #timer { text-align: center; margin: 15px; font-size: 20px; color: #facc15; font-weight: bold; position: sticky; top: 0; background: #0f172a; padding: 10px; z-index: 100; }
    #quiz-container { padding: 20px; max-width: 800px; margin: auto; }
    .question-box { display: none; padding: 25px; background: #1e293b; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
    .question-box.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .option { display: block; background: #334155; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
    .option:hover { background: #475569; }
    .option.selected { border-color: #22c55e; background: #1e3a2f; }
    #navigator { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; background: #020617; gap: 5px; }
    .nav-btn { width: 35px; height: 35px; background: #334155; color: white; border-radius: 5px; text-align: center; line-height: 35px; cursor: pointer; font-size: 12px; }
    .nav-btn.answered { background: #22c55e; }
    .nav-btn.current { border: 2px solid #facc15; font-weight: bold; }
    .controls { text-align: center; margin-top: 20px; }
    button { padding: 12px 25px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; background: #22c55e; color: white; font-weight: bold; font-size: 16px; }
    button:disabled { background: #475569; cursor: not-allowed; }
    #results-container { display: none; padding: 30px; text-align: center; max-width: 600px; margin: auto; }
    .review-item { text-align: left; background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 10px; }
  </style>
</head>
<body>

<header>📖 Bible Quiz Platform</header>
<div id="timer">⏱ Time Left: 20:00</div>
<div id="navigator"></div>

<div id="quiz-container">
  </div>

<div class="controls">
  <button id="prev-btn" onclick="changeQuestion(-1)">Previous</button>
  <button id="next-btn" onclick="changeQuestion(1)">Next</button>
  <button id="submit-btn" onclick="submitQuiz()" style="background: #3b82f6;">Submit Quiz</button>
</div>

<div id="results-container">
  <h2 id="score-display"></h2>
  <p id="feedback-msg"></p>
  <button onclick="location.reload()">Restart Quiz</button>
  <div id="review-area"></div>
</div>

<audio id="bg-music" loop><source src="baruch.mp3" type="audio/mpeg"></audio>

<script src="script.js"></script>
<script src="engine.js"></script>

</body>
</html>
